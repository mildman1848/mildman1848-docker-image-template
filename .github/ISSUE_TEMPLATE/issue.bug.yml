name: Bug Report
description: Report a reproducible problem with LinuxServer.io-style Docker Image Template
labels: [bug]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to report a bug.

        Before submitting, please make sure you have:
        - [ ] searched existing issues to avoid duplicates
        - [ ] tested the current image/tag where possible
        - [ ] removed secrets, tokens, passwords, and private hostnames from logs

  - type: checkboxes
    attributes:
      label: Existing issues
      description: Please search to see if an issue already exists for the bug you encountered.
      options:
        - label: I have searched the existing issues
          required: true

  - type: textarea
    attributes:
      label: Current behavior
      description: What is happening?
    validations:
      required: true

  - type: textarea
    attributes:
      label: Expected behavior
      description: What did you expect to happen?
    validations:
      required: true

  - type: textarea
    attributes:
      label: Steps to reproduce
      description: Provide exact reproduction steps.
      placeholder: |
        1. Start the container with ...
        2. Run ...
        3. See error ...
    validations:
      required: true

  - type: textarea
    attributes:
      label: Environment
      description: Host and runtime details.
      value: |
        - OS:
        - Docker version:
        - Docker Compose version:
        - Image tag:
        - Architecture: amd64 / arm64 / other
    validations:
      required: true

  - type: textarea
    attributes:
      label: Container creation
      description: Provide the Docker command or Compose service used to create the container. Redact secrets.
      render: yaml
      placeholder: |
        services:
          <image-name>:
            image: <image-name>:<tag>
            ports:
              - "<container-port>:<container-port>"
            volumes:
              - ./config:/config
            environment:
              - PUID=1000
              - PGID=1000
              - TZ=Etc/UTC
    validations:
      required: true

  - type: textarea
    attributes:
      label: Container logs
      description: Provide relevant container logs. Redact secrets before posting.
      render: shell
      placeholder: |
        docker logs <image-name>
    validations:
      required: true

  - type: textarea
    attributes:
      label: Additional context
      description: Add screenshots, references, or anything else useful.

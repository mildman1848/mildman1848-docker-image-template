name: Feature Request
description: Suggest an improvement for LinuxServer.io-style Docker Image Template
title: "[FEAT] "
labels: [enhancement]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for suggesting an improvement.

        Before submitting, please make sure:
        - [ ] you have searched existing issues and discussions
        - [ ] this is a feature request, not a bug report
        - [ ] you have considered whether the change belongs upstream instead

  - type: checkboxes
    attributes:
      label: Existing issues
      description: Please search to see if an issue already exists for this feature.
      options:
        - label: I have searched the existing issues
          required: true

  - type: textarea
    attributes:
      label: Feature description
      description: What should be added or changed?
    validations:
      required: true

  - type: textarea
    attributes:
      label: Motivation
      description: Why is this useful? What problem does it solve?
    validations:
      required: true

  - type: textarea
    attributes:
      label: Possible implementation
      description: Optional implementation idea, config example, or workflow suggestion.
      render: yaml

  - type: textarea
    attributes:
      label: Additional context
      description: Add references, screenshots, or related issues.

name: Docker Build

on:
  workflow_call:
    inputs:
      image_name:
        required: true
        type: string
      dockerfile:
        required: false
        type: string
        default: Dockerfile
      context:
        required: false
        type: string
        default: .
      platforms:
        required: false
        type: string
        default: linux/amd64,linux/arm64,linux/arm/v7
      push:
        required: false
        type: boolean
        default: false
      gitlab_image:
        required: false
        type: string
        default: ''
      codeberg_registry:
        required: false
        type: string
        default: codeberg.org
      codeberg_image:
        required: false
        type: string
        default: ''
    secrets:
      DOCKERHUB_USERNAME:
        required: false
      DOCKERHUB_TOKEN:
        required: false
      GITLAB_REGISTRY_USER:
        required: false
      GITLAB_REGISTRY_TOKEN:
        required: false
      CODEBERG_REGISTRY_USER:
        required: false
      CODEBERG_REGISTRY_TOKEN:
        required: false

permissions:
  contents: read
  packages: write
  id-token: write
  security-events: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Resolve image targets
        id: images
        env:
          IMAGE_NAME: ${{ inputs.image_name }}
          DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
          GITLAB_IMAGE: ${{ inputs.gitlab_image }}
          CODEBERG_IMAGE: ${{ inputs.codeberg_image }}
        run: |
          {
            echo 'images<<EOF'
            echo "ghcr.io/${GITHUB_REPOSITORY_OWNER}/${IMAGE_NAME}"
            if [[ -n "${DOCKERHUB_USERNAME}" ]]; then
              echo "docker.io/${DOCKERHUB_USERNAME}/${IMAGE_NAME}"
            fi
            if [[ -n "${GITLAB_IMAGE}" ]]; then
              echo "${GITLAB_IMAGE}"
            fi
            if [[ -n "${CODEBERG_IMAGE}" ]]; then
              echo "${CODEBERG_IMAGE}"
            fi
            echo 'EOF'
          } >> "$GITHUB_OUTPUT"

      - name: Login to GHCR
        if: inputs.push
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ github.token }}

      - name: Login to Docker Hub
        if: inputs.push && secrets.DOCKERHUB_USERNAME != '' && secrets.DOCKERHUB_TOKEN != ''
        uses: docker/login-action@v3
        with:
          registry: docker.io
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Login to GitLab Registry
        if: inputs.push && inputs.gitlab_image != '' && secrets.GITLAB_REGISTRY_USER != '' && secrets.GITLAB_REGISTRY_TOKEN != ''
        uses: docker/login-action@v3
        with:
          registry: registry.gitlab.com
          username: ${{ secrets.GITLAB_REGISTRY_USER }}
          password: ${{ secrets.GITLAB_REGISTRY_TOKEN }}

      - name: Login to Codeberg Registry
        if: inputs.push && inputs.codeberg_image != '' && secrets.CODEBERG_REGISTRY_USER != '' && secrets.CODEBERG_REGISTRY_TOKEN != ''
        uses: docker/login-action@v3
        with:
          registry: ${{ inputs.codeberg_registry }}
          username: ${{ secrets.CODEBERG_REGISTRY_USER }}
          password: ${{ secrets.CODEBERG_REGISTRY_TOKEN }}

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ steps.images.outputs.images }}
          tags: |
            type=ref,event=branch
            type=ref,event=tag
            type=sha,prefix=sha-
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build image
        uses: docker/build-push-action@v7
        with:
          context: ${{ inputs.context }}
          file: ${{ inputs.dockerfile }}
          platforms: ${{ inputs.platforms }}
          push: ${{ inputs.push }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            BUILD_DATE=${{ fromJSON(steps.meta.outputs.json).labels['org.opencontainers.image.created'] }}
            VERSION=${{ fromJSON(steps.meta.outputs.json).labels['org.opencontainers.image.version'] }}
            VCS_REF=${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          provenance: true
          sbom: true

name: Static Lint

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Install hadolint
        run: |
          version=v2.14.0
          curl -fsSL "https://github.com/hadolint/hadolint/releases/download/${version}/hadolint-linux-x86_64" -o hadolint
          curl -fsSL "https://github.com/hadolint/hadolint/releases/download/${version}/hadolint-linux-x86_64.sha256" -o hadolint.sha256
          mv hadolint hadolint-linux-x86_64
          sha256sum -c hadolint.sha256
          sudo install -m 0755 hadolint-linux-x86_64 /usr/local/bin/hadolint

      - name: Run static lint
        run: scripts/lint-static.sh

      - name: Run hadolint
        uses: hadolint/hadolint-action@v3.3.0
        with:
          recursive: true
          config: .hadolint.yaml

name: Static Lint

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Run static lint
        run: scripts/lint-static.sh

      - name: Run hadolint
        uses: hadolint/hadolint-action@v3.3.0
        with:
          recursive: true
          config: .hadolint.yaml
